<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liiklusreguleerija</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }
#app { display: flex; height: 100vh; }
#sidebar { width: 280px; background: #16213e; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
#main { flex: 1; position: relative; }
canvas { display: block; }
h1 { font-size: 1.2em; color: #e94560; text-align: center; }
h2 { font-size: 0.9em; color: #0f3460; background: #e94560; padding: 6px 10px; border-radius: 4px; margin-bottom: 8px; }
.stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85em; }
.stat span:last-child { color: #e94560; font-weight: bold; }
button { background: #0f3460; color: #eee; border: none; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85em; transition: all 0.2s; width: 100%; text-align: left; }
button:hover { background: #e94560; transform: translateX(4px); }
button.active { background: #e94560; }
.quiz-box { background: #0f3460; padding: 12px; border-radius: 8px; margin-top: 8px; }
.quiz-q { font-size: 0.85em; margin-bottom: 8px; }
.quiz-options { display: flex; flex-direction: column; gap: 4px; }
.quiz-options button { font-size: 0.8em; padding: 6px 10px; }
.correct { background: #2ecc71 !important; }
.wrong { background: #c0392b !important; }
#event-banner { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #e94560; padding: 12px 24px; border-radius: 8px; font-weight: bold; display: none; z-index: 100; animation: pulse 0.5s ease; }
@keyframes pulse { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }
#score-display { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px; font-size: 0.9em; }
#level-display { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px; font-size: 0.9em; }
.hint { font-size: 0.75em; color: #888; margin-top: 4px; font-style: italic; }
.parking-lot { display: grid; gap: 4px; margin-top: 8px; }
.parking-row { display: flex; gap: 4px; justify-content: center; }
.parking-spot { width: 36px; height: 48px; border: 2px dashed #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2em; cursor: pointer; transition: all 0.2s; position: relative; }
.parking-spot:hover { border-color: #e94560; background: rgba(233,69,96,0.1); }
.parking-spot.occupied { border-style: solid; border-color: #e94560; background: rgba(233,69,96,0.2); }
.parking-spot.target { border-color: #2ecc71; animation: glow 1s infinite alternate; }
.parking-spot.wrong { border-color: #c0392b; background: rgba(192,57,43,0.3); }
@keyframes glow { from { box-shadow: 0 0 5px #2ecc71; } to { box-shadow: 0 0 15px #2ecc71; } }
.text-task { background: #0f3460; padding: 12px; border-radius: 8px; margin-top: 8px; }
.text-task h3 { font-size: 0.9em; color: #e94560; margin-bottom: 8px; }
.text-task p { font-size: 0.82em; line-height: 1.5; margin-bottom: 8px; }
.text-task input { width: 100%; padding: 8px; border: 1px solid #0f3460; border-radius: 4px; background: #16213e; color: #eee; font-size: 0.85em; margin-bottom: 8px; }
.text-task .result { font-size: 0.8em; padding: 6px; border-radius: 4px; margin-top: 4px; }
.calc-box { background: #16213e; padding: 8px; border-radius: 4px; margin-top: 6px; font-size: 0.78em; color: #aaa; }
</style>
</head>
<body>
<div id="app">
<div id="sidebar">
<h1>🚦 Liiklusreguleerija</h2>
<div><h2>📊 Statistika</h2>
<div class="stat"><span>Sõidukid kokku:</span><span id="s-vehicles">0</span></div>
<div class="stat"><span>Keskmine ooteaeg:</span><span id="s-wait">0s</span></div>
<div class="stat"><span>CO2 heide:</span><span id="s-co2">0 kg</span></div>
<div class="stat"><span>Õnnestumine:</span><span id="s-success">0%</span></div>
<div class="stat"><span>Kiiruskeskmine:</span><span id="s-speed">0 km/h</span></div>
</div>
<div><h2>🎮 Tegevused</h2>
<button onclick="setMode('foor')">🚦 Fooride juhtimine</button>
<button onclick="setMode('parkla')">🅿️ Parkla</button>
<button onclick="setMode('parkimine')">🅿️ Parkimine</button>
<button onclick="setMode('kiirus')">🏁 Kiiruse arvutamine</button>
<button onclick="setMode('prioriteet')">🚑 Prioriteedid</button>
<button onclick="setMode('reaktsioon')">⚡ Reaktsioonid</button>
<button onclick="setMode('ylesanded')">📝 Tekstülesanded</button>
<button onclick="setMode('quiz')">❓ Kvissiülesanne</button>
</div>
<div id="quiz-area"></div>
<div class="hint" id="hint-text">Vali tegevus alustamiseks. Klõpsa fooridel või vasta küsimustele.</div>
<div style="margin-top:auto"><button onclick="resetGame()" style="background:#555;font-size:0.75em;padding:6px">🔄 Lähtesta punktid</button></div>
</div>
<div id="main">
<canvas id="canvas"></canvas>
<div id="event-banner"></div>
<div id="score-display">🏆 Punktid: <span id="score">0</span></div>
<div id="level-display">Tase: <span id="level">1</span></div>
</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
    const main = document.getElementById('main');
    W = canvas.width = main.clientWidth;
    H = canvas.height = main.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let score = parseInt(localStorage.getItem('traffic_score') || '0', 10);
let level = parseInt(localStorage.getItem('traffic_level') || '1', 10);
if (isNaN(score) || score < 0 || score > 1000000) { score = 0; }
if (isNaN(level) || level < 1 || level > 10) { level = 1; }
let mode = 'foor';
let vehicles = [], totalVehicles = 0, totalWait = 0, totalCO2 = 0, successCount = 0;
let intersection = { x: 0, y: 0, lights: { ns: 'red', ew: 'red' }, timer: 0, autoMode: true };
let events = [], currentEvent = null, eventTimer = 0;
let quiz = null, quizAnswered = false;
let reactionStart = 0, reactionActive = false, reactionTime = 0, reactionTimeout = null;
let reactionRetryTimeout = null;
let priorityQueue = [];

// Vehicle class
class Vehicle {
    constructor(lane) {
        this.lane = lane; // 'N','S','E','W'
        this.speed = 0;
        this.maxSpeed = 2 + Math.random();
        this.waiting = false;
        this.waitTime = 0;
        this.co2 = 0;
        this.isEmergency = Math.random() < 0.05;
        this.isBus = Math.random() < 0.1;
        this.color = this.isEmergency ? '#ff0' : this.isBus ? '#f80' : `hsl(${Math.random()*360},70%,50%)`;
        this.size = this.isBus ? 14 : 10;
        
        if (lane === 'N') { this.x = intersection.x - 20; this.y = 0; this.dx = 0; this.dy = 1; }
        else if (lane === 'S') { this.x = intersection.x + 20; this.y = H; this.dx = 0; this.dy = -1; }
        else if (lane === 'E') { this.x = W; this.y = intersection.y - 20; this.dx = -1; this.dy = 0; }
        else { this.x = 0; this.y = intersection.y + 20; this.dx = 1; this.dy = 0; }
    }
    
    update(dt) {
        const stopY = intersection.y - 60;
        const stopX = intersection.x - 60;
        const stopY2 = intersection.y + 60;
        const stopX2 = intersection.x + 60;
        
        let shouldStop = false;
        const distToIntersection = Math.abs((this.dy !== 0 ? this.y - intersection.y : this.x - intersection.x));
        
        if (distToIntersection < 80 && distToIntersection > 10) {
            if (this.dy > 0 && intersection.lights.ns === 'red') shouldStop = true;
            if (this.dy < 0 && intersection.lights.ns === 'red') shouldStop = true;
            if (this.dx > 0 && intersection.lights.ew === 'red') shouldStop = true;
            if (this.dx < 0 && intersection.lights.ew === 'red') shouldStop = true;
        }
        
        // Priority: emergency vehicles don't stop
        if (this.isEmergency) shouldStop = false;
        
        if (shouldStop) {
            this.waiting = true;
            this.waitTime += dt;
            this.co2 += dt * 0.01;
            this.speed = Math.max(0, this.speed - 5 * dt);
        } else {
            this.waiting = false;
            this.speed = Math.min(this.maxSpeed, this.speed + 3 * dt);
        }
        
        this.x += this.dx * this.speed;
        this.y += this.dy * this.speed;
        
        // Remove if off screen
        return this.x > -50 && this.x < W + 50 && this.y > -50 && this.y < H + 50;
    }
    
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.dx !== 0) ctx.rotate(this.dx > 0 ? 0 : Math.PI);
        else ctx.rotate(this.dy > 0 ? Math.PI/2 : -Math.PI/2);
        
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size/1.5);
        
        if (this.isEmergency) {
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(0, -this.size/2, 3, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
}

// Spawn vehicles
let spawnTimer = 0;
function spawnVehicle(dt) {
    spawnTimer += dt;
    const rate = Math.max(0.5, 2 - level * 0.2);
    if (spawnTimer > rate) {
        spawnTimer = 0;
        const lanes = ['N', 'S', 'E', 'W'];
        vehicles.push(new Vehicle(lanes[Math.floor(Math.random() * 4)]));
    }
}

// Traffic light logic
function updateLights(dt) {
    if (!intersection.autoMode) return;
    intersection.timer += dt;
    const greenTime = Math.max(2, 5 - level * 0.3);
    if (intersection.timer > greenTime) {
        intersection.timer = 0;
        if (intersection.lights.ns === 'green') {
            intersection.lights.ns = 'yellow';
            intersection.lights.ew = 'red';
        } else if (intersection.lights.ns === 'yellow') {
            intersection.lights.ns = 'red';
            intersection.lights.ew = 'green';
        } else if (intersection.lights.ew === 'green') {
            intersection.lights.ew = 'yellow';
            intersection.lights.ns = 'red';
        } else {
            intersection.lights.ns = 'green';
            intersection.lights.ew = 'red';
        }
    }
}

// Draw intersection
function drawIntersection() {
    intersection.x = W / 2;
    intersection.y = H / 2;
    
    // Roads
    ctx.fillStyle = '#333';
    ctx.fillRect(0, intersection.y - 40, W, 80);
    ctx.fillRect(intersection.x - 40, 0, 80, H);
    
    // Lane markings
    ctx.strokeStyle = '#fff';
    ctx.setLineDash([20, 15]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, intersection.y); ctx.lineTo(W, intersection.y);
    ctx.moveTo(intersection.x, 0); ctx.lineTo(intersection.x, H);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Traffic lights
    drawLight(intersection.x - 45, intersection.y - 45, intersection.lights.ns);
    drawLight(intersection.x + 45, intersection.y + 45, intersection.lights.ns);
    drawLight(intersection.x - 45, intersection.y + 45, intersection.lights.ew);
    drawLight(intersection.x + 45, intersection.y - 45, intersection.lights.ew);
}

function drawLight(x, y, color) {
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 8, y - 18, 16, 36);
    ctx.fillStyle = color === 'red' ? '#f00' : color === 'yellow' ? '#ff0' : '#0f0';
    ctx.beginPath();
    ctx.arc(x, y === intersection.y - 45 ? -8 : 8, 5, 0, Math.PI * 2);
    ctx.fill();
}

// Events
const eventTypes = [
    { text: '🚑 Kiirabi saabub! Anna tee!', type: 'emergency', hint: 'Muuda foor punasest roheliseks kiirabi suunas' },
    { text: '⚠️ Õnnetus teel! Aeglusta liiklust!', type: 'accident', hint: 'Hoia foor pikemal punasel' },
    { text: '🚌 Linnabusse on palju peale! Prioriteet!', type: 'bus', hint: 'Anna bussile roheline' },
    { text: '🌧️ Vihm! Vähenda kiirust!', type: 'weather', hint: 'Pikenda punast ettevaatusteks' },
    { text: '🏎️ Kiirab sõidab piirangus!', type: 'speed', hint: 'Kontrolli kiirust' }
];

function triggerEvent() {
    currentEvent = eventTypes[Math.floor(Math.random() * eventTypes.length)];
    eventTimer = 8;
    showBanner(currentEvent.text);
    intersection.autoMode = false;
    
    if (currentEvent.type === 'emergency') {
        vehicles.push(new Vehicle(['N','S','E','W'][Math.floor(Math.random()*4)]));
        vehicles[vehicles.length-1].isEmergency = true;
        vehicles[vehicles.length-1].color = '#ff0';
    }
}

function showBanner(text) {
    const banner = document.getElementById('event-banner');
    banner.textContent = text;
    banner.style.display = 'block';
    setTimeout(() => banner.style.display = 'none', 3000);
}

// Quiz system
const quizQuestions = [
    { q: 'Kui pikk on peatumiskaugust 60 km/h kiirusel? (mõjutegur 0.7, teekate kuiv)', options: ['~35m', '~50m', '~25m', '~60m'], a: 0, hint: 'Valem: (v/10)² + (v/10)*3. Kiire reageerimine = lühem pidurdus.' },
    { q: 'Kumb on prioriteet ristmikul?', options: ['Paremalt tulev', 'Kiirabi', 'Tramm', 'Buss'], a: 1, hint: 'Kiirabi alati esiteisigi, isegi kui paremal on keegi.' },
    { q: 'CO2 heide seismisel mootoriga?', options: ['0 kg/h', '~2.3 kg/h', '~5 kg/h', '~1 kg/h'], a: 1, hint: 'Bensiin keskmiselt ~2.3 kg CO2 liitri kohta.' },
    { q: 'Kui kaua võtab reageerimine keskmiselt?', options: ['0.5s', '1.5s', '2.5s', '3s'], a: 1, hint: 'Inimene vajab ~1.5s otsustamaks ja reageerimaks.' },
    { q: 'Kas foori punane + kollane tähendab?', options: ['Mine kohe', 'Valmistu sõitma', 'Seisa', 'Pööra paremale'], a: 1, hint: 'Punane+kollane = valmistumine, mitte sõitmine.' },
    { q: 'Kui palju vähendab kiirus 80→50 km/h CO2?', options: ['~10%', '~25%', '~40%', '~50%'], a: 2, hint: 'Madalam kiirus = tõhusam kütuse kasutus.' },
    { q: 'Kumb foori värv tähendab "seisa"?', options: ['Kollane', 'Punane', 'Roheline', 'Vikervalgus'], a: 1, hint: 'Punane = stop igal juhul.' },
    { q: 'Õnnetuste % "inimlik viga" põhjustel?', options: ['~30%', '~50%', '~70%', '~90%'], a: 3, hint: 'Enamik on tingitud tähelepanu häirumisest või kiirusest.' },
    { q: 'Kui kaugel tuleb hoida sõidukaugus 50 km/h juures?', options: ['10m', '15m', '25m', '50m'], a: 2, hint: 'Reegel: (kiirus/10) * 3 = 15m. Aga 50km/h juures soovitatakse ~25m.' },
    { q: 'Kumb on Eestis tavaline kiiruspiirang linnas?', options: ['30 km/h', '40 km/h', '50 km/h', '60 km/h'], a: 2, hint: 'Eestis on tavaline linnapiirang 50 km/h.' },
    { q: 'Kui palju nähtavust peab olema talvel sõiduks?', options: ['50m', '100m', '200m', '500m'], a: 2, hint: 'Vähemalt 200m nähtavust on vajalik ohutuks sõiduks.' },
    { q: 'Kas tohib parkida kõnnitee 50m raadiuses?', options: ['Jah', 'Ainult öösel', 'Ei', 'Ainult kuni 1h'], a: 2, hint: 'Kõnnitee lähedusel on parkimine keelatud 50m raadiuses.' },
    { q: 'Kui kaua võib auto seisma peatumiskohas?', options: ['5 min', '15 min', 'Maksimaalselt 5 min või kuni takistus eemaldatud', 'Piultult'], a: 2, hint: 'Peatuskohas võib seista võrdselt 5 min või kuni takistus eemaldatud.' }
];

function showQuiz() {
    quizAnswered = false;
    quiz = quizQuestions[Math.floor(Math.random() * quizQuestions.length)];
    const area = document.getElementById('quiz-area');
    area.textContent = '';
    const box = document.createElement('div');
    box.className = 'quiz-box';
    const qDiv = document.createElement('div');
    qDiv.className = 'quiz-q';
    qDiv.textContent = quiz.q;
    box.appendChild(qDiv);
    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'quiz-options';
    quiz.options.forEach((o, i) => {
        const btn = document.createElement('button');
        btn.textContent = o;
        btn.onclick = () => answerQuiz(i);
        optionsDiv.appendChild(btn);
    });
    box.appendChild(optionsDiv);
    const hintDiv = document.createElement('div');
    hintDiv.className = 'hint';
    hintDiv.id = 'quiz-hint';
    box.appendChild(hintDiv);
    area.appendChild(box);
}

function answerQuiz(idx) {
    if (quizAnswered) return;
    quizAnswered = true;
    const buttons = document.querySelectorAll('.quiz-options button');
    buttons.forEach((b, i) => {
        if (i === quiz.a) b.classList.add('correct');
        else if (i === idx) b.classList.add('wrong');
    });
    if (idx === quiz.a) {
        score += 100 * level;
        document.getElementById('quiz-hint').textContent = '✅ Õige! +' + (100*level) + ' punkti. ' + quiz.hint;
    } else {
        document.getElementById('quiz-hint').textContent = '❌ Vale. ' + quiz.hint;
    }
    updateUI();
}

// Reaction test
function startReactionTest() {
    // Clear any existing reaction timeouts before starting a new one
    if (reactionTimeout) { clearTimeout(reactionTimeout); reactionTimeout = null; }
    if (reactionRetryTimeout) { clearTimeout(reactionRetryTimeout); reactionRetryTimeout = null; }

    reactionActive = true;
    reactionStart = performance.now();
    document.getElementById('hint-text').textContent = '⏵ Oota rohelist foori ja klõpsa!';
    reactionTimeout = setTimeout(() => {
        if (reactionActive) {
            reactionActive = false;
            showBanner('⏰ Aeg läbi!');
            document.getElementById('hint-text').textContent = 'Aeg läbi! Uus katse...';
            reactionRetryTimeout = setTimeout(() => { if (mode === 'reaktsioon') startReactionTest(); }, 1500);
        }
    }, 5000);
}

// Keyboard controls for parking sim
const keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (mode === 'parkimine') {
        if (e.key === 'q') parkingSim.car.angle -= 0.05;
        if (e.key === 'e') parkingSim.car.angle += 0.05;
    }
    // Keyboard accessibility shortcuts (works across all non-text-input contexts)
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'n' || e.key === 'N') {
        // Next question / skip
        if (mode === 'kiirus' || mode === 'quiz') { showQuiz(); }
        else if (mode === 'ylesanded') { showTextTask(); }
        else if (mode === 'parkla') { initParkingLot(); drawParkingLot(); }
        else if (mode === 'reaktsioon') { startReactionTest(); }
        else if (mode === 'parkimine') { initParkingSim(); }
    }
    if (e.key === 'h' || e.key === 'H') {
        // Show hint
        const hintEl = document.getElementById('hint-text');
        if (mode === 'quiz' || mode === 'kiirus') {
            const quizHint = document.getElementById('quiz-hint');
            if (quizHint) quizHint.textContent = quiz ? '💡 Vihje: ' + quiz.hint : 'Vihje pole saadaval';
            else if (hintEl) hintEl.textContent = '💡 Vihje: Klõpsa fooril, et vahetada. Jälgi liiklust!';
        }
        if (currentTextTask) {
            const calcBox = document.getElementById('calc-box');
            if (calcBox) { calcBox.style.display = 'block'; calcBox.textContent = '💡 Vihje: ' + currentTextTask.hint + ' | ' + currentTextTask.calc; }
        }
        if (mode === 'parkla') {
            const pH = document.getElementById('parking-hint');
            if (pH) pH.textContent = '💡 Vihje: Vali tähistatud ⭐ koht — see on ainus vaba koht, mis on märgitud!';
        }
        if (mode === 'reaktsioon') {
            if (hintEl) hintEl.textContent = '💡 Vihje: Klõpsa kohe, kui foor muutub roheliseks. Reageerimiseks sul on 5 sekundit.';
        }
        if (mode === 'parkimine') {
            if (hintEl) hintEl.textContent = '💡 Vihje: Kasuta ↑ ette, ▼ tagasi, ← → pööramiseks. Q/E keelega pööra. Parki rohelisse kasti!';
        }
        if (mode === 'prioriteet') {
            if (hintEl) hintEl.textContent = '💡 Vihje: Klõpsa fooril, et kiirabile/bussile roheline anda. Ära uneta teisi sõidukeid!';
        }
        if (mode === 'foor') {
            if (hintEl) hintEl.textContent = '💡 Vihje: Klõpsa punasel fooril, et see roheliseks muuta. Kiirabi ja bussid eiravad punast!';
        }
    }
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Update parking sim from keys
function updateParkingSim(dt) {
    if (mode !== 'parkimine') return;
    const speed = 80 * dt;
    if (keys['ArrowUp']) {
        parkingSim.car.x += Math.cos(parkingSim.car.angle) * speed;
        parkingSim.car.y += Math.sin(parkingSim.car.angle) * speed;
    }
    if (keys['ArrowDown']) {
        parkingSim.car.x -= Math.cos(parkingSim.car.angle) * speed * 0.5;
        parkingSim.car.y -= Math.sin(parkingSim.car.angle) * speed * 0.5;
    }
    if (keys['ArrowLeft']) parkingSim.car.angle -= 2 * dt;
    if (keys['ArrowRight']) parkingSim.car.angle += 2 * dt;
    
    // Check if in target zone
    const dx = parkingSim.car.x - parkingSim.target.x;
    const dy = parkingSim.car.y - parkingSim.target.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 30 && Math.abs(parkingSim.car.angle - parkingSim.target.angle) < 0.3) {
        score += 100;
        showBanner('✅ Parkitud! +100 punkti');
        initParkingSim();
    }
}

canvas.addEventListener('click', (e) => {
    if (mode === 'foor') {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        // Check if clicked near a traffic light
        const lights = [
            { x: intersection.x - 45, y: intersection.y - 45, dir: 'ns' },
            { x: intersection.x + 45, y: intersection.y + 45, dir: 'ns' },
            { x: intersection.x - 45, y: intersection.y + 45, dir: 'ew' },
            { x: intersection.x + 45, y: intersection.y - 45, dir: 'ew' }
        ];
        for (const l of lights) {
            if (Math.abs(mx - l.x) < 20 && Math.abs(my - l.y) < 25) {
                if (intersection[l.dir] === 'red') {
                    intersection[l.dir] = 'green';
                    intersection[l.dir === 'ns' ? 'ew' : 'ns'] = 'red';
                    score += 10;
                    intersection.autoMode = true;
                    intersection.timer = 0;
                    if (currentEvent) {
                        eventTimer = 0;
                        currentEvent = null;
                    }
                }
                break;
            }
        }
    }
    if (mode === 'reaktsioon' && reactionActive) {
        clearTimeout(reactionTimeout);
        reactionTime = (performance.now() - reactionStart) / 1000;
        reactionActive = false;
        if (reactionTime < 1) { score += 150; showBanner('⚡ Suurepärane reaktsioon!'); }
        else if (reactionTime < 2) { score += 75; showBanner('👍 Hea reaktsioon'); }
        else { showBanner('🐢 Aeglane...'); }
        document.getElementById('hint-text').textContent = `Reaktsioon: ${reactionTime.toFixed(2)}s`;
        reactionRetryTimeout = setTimeout(() => { if (mode === 'reaktsioon') startReactionTest(); }, 2000);
        updateUI();
    }
});

// === PARKLA ===
let parkingLot = { spots: [], rows: 4, cols: 6, targetSpot: -1, occupiedCount: 0 };

function initParkingLot() {
    parkingLot.spots = [];
    parkingLot.occupiedCount = 0;
    for (let r = 0; r < parkingLot.rows; r++) {
        for (let c = 0; c < parkingLot.cols; c++) {
            const occupied = Math.random() < 0.4;
            if (occupied) parkingLot.occupiedCount++;
            parkingLot.spots.push({ row: r, col: c, occupied, id: r * parkingLot.cols + c });
        }
    }
    // Pick a free target spot
    const freeSpots = parkingLot.spots.filter(s => !s.occupied);
    parkingLot.targetSpot = freeSpots.length > 0 ? freeSpots[Math.floor(Math.random() * freeSpots.length)].id : -1;
}

function drawParkingLot() {
    const area = document.getElementById('quiz-area');
    area.textContent = '';
    const container = document.createElement('div');
    container.style.marginTop = '8px';
    const header = document.createElement('div');
    header.style.textAlign = 'center';
    header.style.fontSize = '0.85em';
    header.style.marginBottom = '8px';
    header.textContent = '🅿️ Parkla — vabu: ' + parkingLot.spots.filter(s=>!s.occupied).length + '/' + parkingLot.spots.length;
    container.appendChild(header);
    const lotDiv = document.createElement('div');
    lotDiv.style.background = '#333';
    lotDiv.style.padding = '8px';
    lotDiv.style.borderRadius = '8px';
    lotDiv.style.marginBottom = '8px';
    for (let r = 0; r < parkingLot.rows; r++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'parking-row';
        for (let c = 0; c < parkingLot.cols; c++) {
            const spot = parkingLot.spots[r * parkingLot.cols + c];
            const spotDiv = document.createElement('div');
            spotDiv.className = 'parking-spot' + (spot.occupied ? ' occupied' : '') + (spot.id === parkingLot.targetSpot ? ' target' : '');
            spotDiv.textContent = spot.occupied ? '🚗' : (spot.id === parkingLot.targetSpot ? '⭐' : '');
            spotDiv.onclick = () => clickParkingSpot(spot.id);
            rowDiv.appendChild(spotDiv);
        }
        lotDiv.appendChild(rowDiv);
        if (r === 1) {
            const aisle = document.createElement('div');
            aisle.style.height = '8px';
            lotDiv.appendChild(aisle);
        }
    }
    container.appendChild(lotDiv);
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.id = 'parking-hint';
    hint.textContent = 'Klõpsa tähistatud ⭐ kohale, et parkida';
    container.appendChild(hint);
    area.appendChild(container);
}

function clickParkingSpot(id) {
    const spot = parkingLot.spots[id];
    const hint = document.getElementById('parking-hint');
    if (spot.id === parkingLot.targetSpot) {
        hint.textContent = '✅ Tubli! Õige koht! +50 punkti';
        hint.style.color = '#2ecc71';
        score += 50;
        spot.occupied = true;
        setTimeout(() => { initParkingLot(); drawParkingLot(); }, 1500);
    } else if (spot.occupied) {
        hint.textContent = '❌ See koht on juba hõivatud!';
        hint.style.color = '#c0392b';
    } else {
        hint.textContent = '⚠️ Vaba koht, aga vale. Proovi uuesti!';
        hint.style.color = '#f39c12';
    }
    updateUI();
}

// === PARKIMINE (simulaator) ===
let parkingSim = { car: { x: 0, y: 0, angle: 0 }, target: { x: 0, y: 0, angle: 0 }, phase: 'move' };

function initParkingSim() {
    parkingSim.car = { x: 100, y: 300, angle: 0 };
    parkingSim.target = { x: 300 + Math.random() * 200, y: 150, angle: 0 };
    parkingSim.phase = 'move';
}

function drawParkingSim() {
    ctx.fillStyle = '#2d5a27';
    ctx.fillRect(0, 0, W, H);
    
    // Parking lot background
    ctx.fillStyle = '#555';
    ctx.fillRect(50, 80, W - 100, 200);
    
    // Parking spots
    for (let i = 0; i < 8; i++) {
        const sx = 80 + i * ((W - 160) / 8);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(sx, 100, (W - 160) / 8 - 5, 80);
        // Some occupied
        if (i !== 3 && i !== 5) {
            ctx.fillStyle = `hsl(${i * 45}, 60%, 50%)`;
            ctx.fillRect(sx + 5, 108, (W - 160) / 8 - 15, 64);
        }
    }
    
    // Target spot highlight
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 3;
    const tx = 80 + 5 * ((W - 160) / 8);
    ctx.strokeRect(tx, 100, (W - 160) / 8 - 5, 80);
    
    // Draw car
    ctx.save();
    ctx.translate(parkingSim.car.x, parkingSim.car.y);
    ctx.rotate(parkingSim.car.angle);
    ctx.fillStyle = '#e94560';
    ctx.fillRect(-20, -12, 40, 24);
    ctx.fillStyle = '#fff';
    ctx.fillRect(10, -10, 8, 20); // windshield
    ctx.restore();
    
    // Instructions
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Kasuta nooleklahve ← → ↑ ja Q/E pööramiseks. Parki rohelisse kasti!', W / 2, H - 40);
    ctx.fillText('Faas: ' + (parkingSim.phase === 'move' ? 'Liigu sihtkohta' : 'Pööra ja parki'), W / 2, H - 20);
}

let currentTextTask = null;

function showTextTask() {
    currentTextTask = textTasks[Math.floor(Math.random() * textTasks.length)];
    const area = document.getElementById('quiz-area');
    area.textContent = '';
    const taskDiv = document.createElement('div');
    taskDiv.className = 'text-task';
    const h3 = document.createElement('h3');
    h3.textContent = currentTextTask.title;
    taskDiv.appendChild(h3);
    const p = document.createElement('p');
    p.textContent = currentTextTask.text;
    taskDiv.appendChild(p);
    const input = document.createElement('input');
    input.type = 'number';
    input.id = 'text-answer';
    input.placeholder = 'Sisesta vastus ja vajuta Enter...';
    input.step = '0.01';
    input.onkeydown = (event) => { if (event.key === 'Enter') checkTextAnswer(); };
    taskDiv.appendChild(input);
    const btn = document.createElement('button');
    btn.textContent = 'Kontrolli';
    btn.style.marginTop = '4px';
    btn.onclick = checkTextAnswer;
    taskDiv.appendChild(btn);
    const resultDiv = document.createElement('div');
    resultDiv.className = 'result';
    resultDiv.id = 'text-result';
    taskDiv.appendChild(resultDiv);
    const calcBox = document.createElement('div');
    calcBox.className = 'calc-box';
    calcBox.id = 'calc-box';
    calcBox.style.display = 'none';
    calcBox.textContent = currentTextTask.calc;
    taskDiv.appendChild(calcBox);
    area.appendChild(taskDiv);
    document.getElementById('text-answer').focus();
}

function checkTextAnswer() {
    const input = document.getElementById('text-answer');
    const result = document.getElementById('text-result');
    const calcBox = document.getElementById('calc-box');
    const val = parseFloat(input.value);
    if (isNaN(val)) {
        result.textContent = 'Sisesta number!';
        result.style.color = '#f39c12';
        return;
    }
    const diff = Math.abs(val - currentTextTask.answer);
    if (diff <= currentTextTask.tolerance) {
        result.textContent = '✅ Õige! +' + (75 * level) + ' punkti';
        result.style.color = '#2ecc71';
        score += 75 * level;
        calcBox.style.display = 'block';
    } else {
        result.textContent = '❌ Vale. Õige vastus: ' + currentTextTask.answer + '. ' + currentTextTask.hint;
        result.style.color = '#c0392b';
        calcBox.style.display = 'block';
    }
    updateUI();
}

function setMode(m) {
    // Clear any pending reaction test timeouts
    if (reactionTimeout) { clearTimeout(reactionTimeout); reactionTimeout = null; }
    if (reactionRetryTimeout) { clearTimeout(reactionRetryTimeout); reactionRetryTimeout = null; }
    reactionActive = false;

    mode = m;
    document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');
    document.getElementById('quiz-area').textContent = '';
    
    if (m === 'foor') {
        intersection.autoMode = true;
        document.getElementById('hint-text').textContent = 'Klõpsa fooril, et vahetada. Jälgi liiklust!';
    } else if (m === 'parkla') {
        initParkingLot();
        drawParkingLot();
        document.getElementById('hint-text').textContent = 'Leia õige parkimiskoht! Vabu kuvatakse tühjana.';
    } else if (m === 'parkimine') {
        initParkingSim();
        document.getElementById('hint-text').textContent = 'Kasuta nooleklahve ← → ↑ ja Q/E pööramiseks. Parki rohelisse kasti!';
    } else if (m === 'kiirus') {
        showQuiz();
        document.getElementById('hint-text').textContent = 'Arvuta õige vastus kiiruse küsimustele.';
    } else if (m === 'prioriteet') {
        intersection.autoMode = false;
        document.getElementById('hint-text').textContent = 'Anna prioriteet kiirabile ja bussidele!';
    } else if (m === 'reaktsioon') {
        startReactionTest();
    } else if (m === 'ylesanded') {
        showTextTask();
        document.getElementById('hint-text').textContent = 'Lahenda praktilised liiklusülesanded arvutustega.';
    } else if (m === 'quiz') {
        showQuiz();
    }
}

// Update UI
function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('s-vehicles').textContent = totalVehicles;
    document.getElementById('s-wait').textContent = totalVehicles > 0 ? (totalWait/totalVehicles).toFixed(1)+'s' : '0s';
    document.getElementById('s-co2').textContent = totalCO2.toFixed(2)+' kg';
    document.getElementById('s-success').textContent = totalVehicles > 0 ? Math.round(successCount/totalVehicles*100)+'%' : '0%';
    const avgSpd = vehicles.length > 0 ? vehicles.reduce((s,v) => s+v.speed, 0)/vehicles.length : 0;
    document.getElementById('s-speed').textContent = (avgSpd * 20).toFixed(0)+' km/h';
    
    // Level up
    const newLevel = Math.floor(score / 500) + 1;
    if (newLevel > level) {
        level = newLevel;
        showBanner('⬆️ Tase ' + level + '!');
    }
    
    // Persist
    localStorage.setItem('traffic_score', score);
    localStorage.setItem('traffic_level', level);
}

// Main loop
let lastTime = 0;
let eventSpawnTimer = 0;

function gameLoop(time) {
    const dt = Math.min((time - lastTime) / 1000, 0.1);
    lastTime = time;
    
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);
    
    drawIntersection();
    
    spawnVehicle(dt);
    updateLights(dt);
    
    // Update vehicles
    vehicles = vehicles.filter(v => {
        const alive = v.update(dt);
        if (!alive) {
            totalVehicles++;
            totalWait += v.waitTime;
            totalCO2 += v.co2;
            if (v.waitTime < 3) successCount++;
            return false;
        }
        return true;
    });
    
    // Draw vehicles
    vehicles.forEach(v => v.draw());
    
    // Events
    eventSpawnTimer += dt;
    if (eventSpawnTimer > 15 + Math.random() * 10 && !currentEvent) {
        eventSpawnTimer = 0;
        triggerEvent();
    }
    if (currentEvent) {
        eventTimer -= dt;
        if (eventTimer <= 0) {
            currentEvent = null;
            intersection.autoMode = true;
        }
    }
    
    // Reaction mode visual
    if (mode === 'reaktsioon') {
        ctx.fillStyle = reactionActive ? '#0f0' : '#666';
        ctx.beginPath();
        ctx.arc(W/2, H/2, 60, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(reactionActive ? 'KLÕPSA!' : 'Oota...', W/2, H/2 + 5);
    }
    
    // Parking simulator
    if (mode === 'parkimine') {
        updateParkingSim(dt);
        drawParkingSim();
    }
    
    updateUI();
    requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);

function resetGame() {
    score = 0;
    level = 1;
    totalVehicles = 0;
    totalWait = 0;
    totalCO2 = 0;
    successCount = 0;
    localStorage.removeItem('traffic_score');
    localStorage.removeItem('traffic_level');
    updateUI();
    showBanner('🔄 Lähtestatud!');
}
