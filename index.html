<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e94560">
<meta name="description" content="Interactive traffic management game with quizzes, parking sim, and reaction tests">
<title>Liiklusreguleeriola</title>

<style>
/* ============================================================
   CSS CUSTOM PROPERTIES & THEMES
   ============================================================ */
:root {
  --bg: #1a1a2e;
  --bg-sidebar: #16213e;
  --bg-card: #0f3460;
  --text: #eee;
  --text-muted: #888;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --success: #2ecc71;
  --warning: #f39c12;
  --danger: #c0392b;
  --sidebar-width: 280px;
  --radius: 8px;
  --transition: 0.2s ease;
}

/* High contrast mode */
[data-theme="high-contrast"] {
  --bg: #000;
  --bg-sidebar: #111;
  --bg-card: #222;
  --text: #fff;
  --text-muted: #ccc;
  --accent: #ff0;
  --accent-hover: #ff6;
  --success: #0f0;
  --warning: #fa0;
  --danger: #f33;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Focus styles for accessibility */
:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}

/* Skip link for screen readers */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  padding: 8px 16px;
  border-radius: 0 0 var(--radius) var(--radius);
  z-index: 1000;
  transition: top 0.3s;
}
.skip-link:focus { top: 0; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { display: flex; height: 100vh; height: 100dvh; }

#sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: transform var(--transition);
  z-index: 50;
}

#main {
  flex: 1;
  position: relative;
  min-width: 0;
}

canvas { display: block; width: 100%; height: 100%; }

/* ============================================================
   LOADING SCREEN
   ============================================================ */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
#loading-screen h1 { font-size: 2em; color: var(--accent); margin-bottom: 16px; }
#loading-screen .spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--bg-card);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-screen .loading-text { margin-top: 12px; color: var(--text-muted); font-size: 0.9em; }

/* ============================================================
   SIDEBAR COMPONENTS
   ============================================================ */
h1 {
  font-size: 1.1em;
  color: var(--accent);
  text-align: center;
  padding: 4px 0;
}

h2 {
  font-size: 0.8em;
  color: var(--bg);
  background: var(--accent);
  padding: 5px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}

.stat {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 0.8em;
}
.stat span:last-child { color: var(--accent); font-weight: bold; }

button {
  background: var(--bg-card);
  color: var(--text);
  border: none;
  padding: 9px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.82em;
  transition: all var(--transition);
  width: 100%;
  text-align: left;
  min-height: 36px;
}
button:hover { background: var(--accent); transform: translateX(3px); }
button:active { transform: translateX(3px) scale(0.97); }
button.active { background: var(--accent); }

/* Language switcher */
.lang-switcher {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: var(--bg);
  border-radius: 6px;
}
.lang-switcher button {
  flex: 1;
  text-align: center;
  padding: 6px 4px;
  font-size: 0.75em;
  min-height: 28px;
}
.lang-switcher button.active { background: var(--accent); }

/* Theme toggle */
.theme-toggle {
  display: flex;
  gap: 4px;
  align-items: center;
}
.theme-toggle button {
  flex: 1;
  text-align: center;
  font-size: 0.75em;
  padding: 5px;
}

/* ============================================================
   QUIZ & TASK BOXES
   ============================================================ */
.quiz-box, .text-task {
  background: var(--bg-card);
  padding: 10px;
  border-radius: var(--radius);
  margin-top: 6px;
}
.quiz-q { font-size: 0.82em; margin-bottom: 8px; line-height: 1.4; }
.quiz-options { display: flex; flex-direction: column; gap: 4px; }
.quiz-options button { font-size: 0.78em; padding: 6px 8px; }
.correct { background: var(--success) !important; }
.wrong { background: var(--danger) !important; }

.text-task h3 { font-size: 0.85em; color: var(--accent); margin-bottom: 6px; }
.text-task p { font-size: 0.8em; line-height: 1.5; margin-bottom: 8px; }
.text-task input {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--bg-card);
  border-radius: 4px;
  background: var(--bg-sidebar);
  color: var(--text);
  font-size: 0.85em;
  margin-bottom: 6px;
}
.text-task .result { font-size: 0.78em; padding: 5px; border-radius: 4px; margin-top: 4px; }
.calc-box {
  background: var(--bg-sidebar);
  padding: 6px;
  border-radius: 4px;
  margin-top: 4px;
  font-size: 0.75em;
  color: var(--text-muted);
}

.hint { font-size: 0.72em; color: var(--text-muted); margin-top: 4px; font-style: italic; }

/* ============================================================
   PARKING LOT
   ============================================================ */
.parking-lot { display: grid; gap: 4px; margin-top: 6px; }
.parking-row { display: flex; gap: 4px; justify-content: center; }
.parking-spot {
  width: 34px; height: 44px;
  border: 2px dashed #555;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1em;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.parking-spot:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
.parking-spot.occupied { border-style: solid; border-color: var(--accent); background: rgba(233,69,96,0.2); }
.parking-spot.target { border-color: var(--success); animation: glow 1s infinite alternate; }
.parking-spot.wrong { border-color: var(--danger); background: rgba(192,57,43,0.3); }
@keyframes glow { from { box-shadow: 0 0 5px var(--success); } to { box-shadow: 0 0 15px var(--success); } }

/* ============================================================
   OVERLAYS & BANNERS
   ============================================================ */
#event-banner {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-weight: bold;
  display: none;
  z-index: 100;
  font-size: 0.85em;
  text-align: center;
  max-width: 80%;
}
@keyframes pulse {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.05); }
}
#event-banner.show { display: block; animation: pulse 0.5s ease; }

#score-display {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.7);
  padding: 6px 12px;
  border-radius: var(--radius);
  font-size: 0.82em;
  z-index: 10;
}
#level-display {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(0,0,0,0.7);
  padding: 6px 12px;
  border-radius: var(--radius);
  font-size: 0.82em;
  z-index: 10;
}

/* Achievements toast */
#achievement-toast {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 0.85em;
  z-index: 200;
  transition: transform 0.4s ease;
  text-align: center;
  max-width: 80%;
}
#achievement-toast.show { transform: translateX(-50%) translateY(0); }

/* ============================================================
   ACHIEVEMENTS PANEL
   ============================================================ */
.achievements-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 150px;
  overflow-y: auto;
}
.achievement-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 4px;
  font-size: 0.72em;
  background: var(--bg);
  opacity: 0.5;
  transition: opacity var(--transition);
}
.achievement-item.unlocked { opacity: 1; }
.achievement-item .icon { font-size: 1.2em; }
.achievement-item .name { flex: 1; }

/* ============================================================
   MOBILE TOUCH CONTROLS
   ============================================================ */
#touch-controls {
  display: none;
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
}
.touch-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(233,69,96,0.7);
  border: none;
  color: #fff;
  font-size: 1.4em;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.touch-btn:active { background: var(--accent); transform: scale(0.9); }
.touch-pad {
  display: grid;
  grid-template-columns: repeat(3, 56px);
  grid-template-rows: repeat(3, 56px);
  gap: 4px;
}
.touch-pad .touch-btn:nth-child(1) { grid-column: 2; grid-row: 1; }
.touch-pad .touch-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
.touch-pad .touch-btn:nth-child(3) { grid-column: 3; grid-row: 2; }
.touch-pad .touch-btn:nth-child(4) { grid-column: 2; grid-row: 3; }

/* ============================================================
   RESPONSIVE DESIGN
   ============================================================ */
.menu-toggle {
  display: none;
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 60;
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: rgba(0,0,0,0.7);
  border: none;
  color: var(--text);
  font-size: 1.2em;
  cursor: pointer;
  text-align: center;
}

@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    width: 260px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
  }
  #sidebar.open { transform: translateX(0); }
  .menu-toggle { display: flex; align-items: center; justify-content: center; }
  #touch-controls { display: block; }
  #score-display, #level-display {
    font-size: 0.72em;
    padding: 4px 8px;
  }
  #score-display { top: 8px; right: 8px; }
  #level-display { top: 8px; left: 60px; }
  .parking-spot { width: 28px; height: 36px; font-size: 0.9em; }
}

@media (max-width: 480px) {
  #sidebar { width: 85vw; }
  h1 { font-size: 1em; }
  button { font-size: 0.78em; padding: 8px 10px; }
}

/* Sidebar overlay for mobile */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 40;
}
#sidebar-overlay.show { display: block; }

/* ============================================================
   SCREEN READER ONLY
   ============================================================ */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>

      <button onclick="setMode('prioriteet')" id="btn-prioriteet" data-i18n="mode-prioriteet">🚑 Prioriteedid</button>

      <button onclick="setMode('ylesanded')" id="btn-ylesanded" data-i18n="mode-ylesanded">📝 Tekstülesanded</button>
      <button onclick="setMode('quiz')" id="btn-quiz" data-i18n="mode-quiz">❓ Kvissiülesanne</button>
    </div>

    <!-- Achievements -->
    <div>
      <h2 data-i18n="achievements-title">🏆 Saavutused</h2>
      <div class="achievements-list" id="achievements-list" role="list" aria-label="Achievements"></div>
    </div>

    <!-- Quiz/Task area -->
    <div id="quiz-area"></div>

    <!-- Hint -->
    <div class="hint" id="hint-text" data-i18n="hint-default">Vali tegevus alustamiseks.</div>

    <!-- Reset -->
    <div style="margin-top:auto">
      <button onclick="resetGame()" data-i18n="reset" style="background:#555;font-size:0.72em;padding:5px">🔄 Lähtesta</button>
    </div>
  </nav>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Main content -->
  <main id="main-content">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu" aria-expanded="false" id="menu-btn">☰</button>
    <canvas id="canvas"></canvas>
    <div id="event-banner" role="alert" aria-live="assertive"></div>
    <div id="score-display">🏆 <span data-i18n="score-label">Punktid</span>: <span id="score">0</span></div>
    <div id="level-display">Tase: <span id="level">1</span></div>
    <div id="achievement-toast" role="alert" aria-live="polite"></div>

    <!-- Touch controls for mobile -->
    <div id="touch-controls">
      <div class="touch-pad" id="touch-pad">
        <button class="touch-btn" data-key="ArrowUp" aria-label="Up">▲</button>
        <button class="touch-btn" data-key="ArrowLeft" aria-label="Left">◀</button>
        <button class="touch-btn" data-key="ArrowRight" aria-label="Right">▶</button>
        <button class="touch-btn" data-key="ArrowDown" aria-label="Down">▼</button>
      </div>
    </div>
  </main>
</div>

<!-- Screen reader announcements -->
<div id="sr-announcements" class="sr-only" aria-live="polite" role="status"></div>

/* ============================================================
   SOUND EFFECTS (Web Audio API)
   ============================================================ */
let audioCtx = null;
let soundEnabled = localStorage.getItem('traffic_sound') !== 'false';

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.3) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

  playTone(523, 0.1, 'sine', 0.2);

/* ============================================================
   VEHICLE CLASS
   ============================================================ */
class Vehicle {
  constructor(lane) {
    this.lane = lane;
    this.speed = 0;
    this.maxSpeed = 2 + Math.random();
    this.waiting = false;
    this.waitTime = 0;
    this.co2 = 0;
    this.isEmergency = Math.random() < 0.05;
    this.isBus = Math.random() < 0.1;
    this.color = this.isEmergency ? '#ff0' : this.isBus ? '#f80' : `hsl(${Math.random()*360},70%,50%)`;
    this.size = this.isBus ? 14 : 10;

    if (lane === 'N') { this.x = intersection.x - 20; this.y = 0; this.dx = 0; this.dy = 1; }
    else if (lane === 'S') { this.x = intersection.x + 20; this.y = H; this.dx = 0; this.dy = -1; }
    else if (lane === 'E') { this.x = W; this.y = intersection.y - 20; this.dx = -1; this.dy = 0; }
    else { this.x = 0; this.y = intersection.y + 20; this.dx = 1; this.dy = 0; }
  }

  update(dt) {
    const distToIntersection = Math.abs((this.dy !== 0 ? this.y - intersection.y : this.x - intersection.x));
    let shouldStop = false;

    if (distToIntersection < 80 && distToIntersection > 10) {
      if (this.dy > 0 && intersection.lights.ns === 'red') shouldStop = true;
      if (this.dy < 0 && intersection.lights.ns === 'red') shouldStop = true;
      if (this.dx > 0 && intersection.lights.ew === 'red') shouldStop = true;
      if (this.dx < 0 && intersection.lights.ew === 'red') shouldStop = true;
    }

    if (this.isEmergency) shouldStop = false;

    if (shouldStop) {
      this.waiting = true;
      this.waitTime += dt;
      this.co2 += dt * 0.01;
      this.speed = Math.max(0, this.speed - 5 * dt);
    } else {
      this.waiting = false;
      this.speed = Math.min(this.maxSpeed, this.speed + 3 * dt);
    }

    this.x += this.dx * this.speed;
    this.y += this.dy * this.speed;

    return this.x > -50 && this.x < W + 50 && this.y > -50 && this.y < H + 50;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.dx !== 0) ctx.rotate(this.dx > 0 ? 0 : Math.PI);
    else ctx.rotate(this.dy > 0 ? Math.PI/2 : -Math.PI/2);

    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size/1.5);

    if (this.isEmergency) {
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(0, -this.size/2, 3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

/* ============================================================
   SPAWNING & LIGHTS
   ============================================================ */
let spawnTimer = 0;

function spawnVehicle(dt) {
  spawnTimer += dt;
  const rate = Math.max(0.5, 2 - level * 0.2);
  if (spawnTimer > rate) {
    spawnTimer = 0;
    const lanes = ['N', 'S', 'E', 'W'];
    vehicles.push(new Vehicle(lanes[Math.floor(Math.random() * 4)]));
  }
}

function updateLights(dt) {
  if (!intersection.autoMode) return;
  intersection.timer += dt;
  const greenTime = Math.max(2, 5 - level * 0.3);
  if (intersection.timer > greenTime) {
    intersection.timer = 0;
    if (intersection.lights.ns === 'green') {
      intersection.lights.ns = 'yellow';
      intersection.lights.ew = 'red';
    } else if (intersection.lights.ns === 'yellow') {
      intersection.lights.ns = 'red';
      intersection.lights.ew = 'green';
    } else if (intersection.lights.ew === 'green') {
      intersection.lights.ew = 'yellow';
      intersection.lights.ns = 'red';
    } else {
      intersection.lights.ns = 'green';
      intersection.lights.ew = 'red';
    }
  }
}

/* ============================================================
   DRAWING
   ============================================================ */
function drawIntersection() {
  intersection.x = W / 2;
  intersection.y = H / 2;

  // Roads
  ctx.fillStyle = '#333';
  ctx.fillRect(0, intersection.y - 40, W, 80);
  ctx.fillRect(intersection.x - 40, 0, 80, H);

  // Lane markings
  ctx.strokeStyle = '#fff';
  ctx.setLineDash([20, 15]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, intersection.y); ctx.lineTo(W, intersection.y);
  ctx.moveTo(intersection.x, 0); ctx.lineTo(intersection.x, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Traffic lights
  drawLight(intersection.x - 45, intersection.y - 45, intersection.lights.ns);
  drawLight(intersection.x + 45, intersection.y + 45, intersection.lights.ns);
  drawLight(intersection.x - 45, intersection.y + 45, intersection.lights.ew);
  drawLight(intersection.x + 45, intersection.y - 45, intersection.lights.ew);
}

function drawLight(x, y, color) {
  ctx.fillStyle = '#222';
  ctx.fillRect(x - 8, y - 18, 16, 36);
  ctx.fillStyle = color === 'red' ? '#f00' : color === 'yellow' ? '#ff0' : '#0f0';
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
}

/* ============================================================
   PARKING LOT
   ============================================================ */
function initParkingLot() {
  parkingLot.spots = [];
  parkingLot.occupiedCount = 0;
  for (let r = 0; r < parkingLot.rows; r++) {
    for (let c = 0; c < parkingLot.cols; c++) {
      const occupied = Math.random() < 0.4;
      if (occupied) parkingLot.occupiedCount++;
      parkingLot.spots.push({ row: r, col: c, occupied, id: r * parkingLot.cols + c });
    }
  }
  const freeSpots = parkingLot.spots.filter(s => !s.occupied);
  parkingLot.targetSpot = freeSpots.length > 0 ? freeSpots[Math.floor(Math.random() * freeSpots.length)].id : -1;
}

function drawParkingLot() {
  const area = document.getElementById('quiz-area');
  area.textContent = '';
  const container = document.createElement('div');
  container.style.marginTop = '8px';
  const header = document.createElement('div');
  header.style.textAlign = 'center';
  header.style.fontSize = '0.82em';
  header.style.marginBottom = '6px';
  header.textContent = '🅿️ Parkla — vabu: ' + parkingLot.spots.filter(s=>!s.occupied).length + '/' + parkingLot.spots.length;
  container.appendChild(header);
  const lotDiv = document.createElement('div');
  lotDiv.style.background = '#333';
  lotDiv.style.padding = '8px';
  lotDiv.style.borderRadius = '8px';
  lotDiv.style.marginBottom = '8px';
  for (let r = 0; r < parkingLot.rows; r++) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'parking-row';
    for (let c = 0; c < parkingLot.cols; c++) {
      const spot = parkingLot.spots[r * parkingLot.cols + c];
      const spotDiv = document.createElement('div');
      spotDiv.className = 'parking-spot' + (spot.occupied ? ' occupied' : '') + (spot.id === parkingLot.targetSpot ? ' target' : '');
      spotDiv.textContent = spot.occupied ? '🚗' : (spot.id === parkingLot.targetSpot ? '⭐' : '');
      spotDiv.setAttribute('role', 'button');
      spotDiv.setAttribute('aria-label', spot.occupied ? 'Occupied spot' : (spot.id === parkingLot.targetSpot ? 'Target spot' : 'Empty spot'));
      spotDiv.onclick = () => clickParkingSpot(spot.id);
      rowDiv.appendChild(spotDiv);
    }
    lotDiv.appendChild(rowDiv);
    if (r === 1) {
      const aisle = document.createElement('div');
      aisle.style.height = '8px';
      lotDiv.appendChild(aisle);
    }
  }
  container.appendChild(lotDiv);
  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.id = 'parking-hint';
  hint.textContent = 'Klõpsa tähistatud ⭐ kohale, et parkida';
  container.appendChild(hint);
  area.appendChild(container);
}

function clickParkingSpot(id) {
  const spot = parkingLot.spots[id];
  const hint = document.getElementById('parking-hint');
  if (spot.id === parkingLot.targetSpot) {
    hint.textContent = '✅ Tubli! Õige koht! +50 punkti';
    hint.style.color = 'var(--success)';
    score += 50;
    stats.parkingSuccess++;
    localStorage.setItem('traffic_stats', JSON.stringify(stats));
    spot.occupied = true;
    playSoundCorrect();
    checkAchievements();
    setTimeout(() => { initParkingLot(); drawParkingLot(); }, 1500);
  } else if (spot.occupied) {
    hint.textContent = '❌ See koht on juba hõivatud!';
    hint.style.color = 'var(--danger)';
    playSoundWrong();
  } else {
    hint.textContent = '⚠️ Vaba koht, aga vale. Proovi uuesti!';
    hint.style.color = 'var(--warning)';
    playSoundWrong();
  }
  updateUI();
}

/* ============================================================
   PARKING SIMULATOR
   ============================================================ */
function initParkingSim() {
  parkingSim.car = { x: 100, y: 300, angle: 0 };
  parkingSim.target = { x: 300 + Math.random() * 200, y: 150, angle: 0 };
  parkingSim.phase = 'move';
}

function drawParkingSim() {
  ctx.fillStyle = '#2d5a27';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#555';
  ctx.fillRect(50, 80, W - 100, 200);

  for (let i = 0; i < 8; i++) {
    const sx = 80 + i * ((W - 160) / 8);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, 100, (W - 160) / 8 - 5, 80);
    if (i !== 3 && i !== 5) {
      ctx.fillStyle = `hsl(${i * 45}, 60%, 50%)`;
      ctx.fillRect(sx + 5, 108, (W - 160) / 8 - 15, 64);
    }
  }

  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth = 3;
  const tx = 80 + 5 * ((W - 160) / 8);
  ctx.strokeRect(tx, 100, (W - 160) / 8 - 5, 80);

  ctx.save();
  ctx.translate(parkingSim.car.x, parkingSim.car.y);
  ctx.rotate(parkingSim.car.angle);
  ctx.fillStyle = '#e94560';
  ctx.fillRect(-20, -12, 40, 24);
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, -10, 8, 20);
  ctx.restore();

  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Kasuta nooleklahve ← → ↑ ja Q/E pööramiseks. Parki rohelisse kasti!', W / 2, H - 40);
  ctx.fillText('Faas: ' + (parkingSim.phase === 'move' ? 'Liigu sihtkohta' : 'Pööra ja parki'), W / 2, H - 20);
}

function updateParkingSim(dt) {
  if (mode !== 'parkimine') return;
  const speed = 80 * dt;
  if (keys['ArrowUp']) {
    parkingSim.car.x += Math.cos(parkingSim.car.angle) * speed;
    parkingSim.car.y += Math.sin(parkingSim.car.angle) * speed;
  }
  if (keys['ArrowDown']) {
    parkingSim.car.x -= Math.cos(parkingSim.car.angle) * speed * 0.5;
    parkingSim.car.y -= Math.sin(parkingSim.car.angle) * speed * 0.5;
  }
  if (keys['ArrowLeft']) parkingSim.car.angle -= 2 * dt;
  if (keys['ArrowRight']) parkingSim.car.angle += 2 * dt;

  const dx = parkingSim.car.x - parkingSim.target.x;
  const dy = parkingSim.car.y - parkingSim.target.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 30 && Math.abs(parkingSim.car.angle - parkingSim.target.angle) < 0.3) {
    score += 100;
    stats.parkingSuccess++;
    localStorage.setItem('traffic_stats', JSON.stringify(stats));
    showBanner('✅ Parkitud! +100 punkti');
    playSoundCorrect();
    checkAchievements();
    initParkingSim();
  }
}

function showTextTask() {
  currentTextTask = textTasks[Math.floor(Math.random() * textTasks.length)];
  const area = document.getElementById('quiz-area');
  area.textContent = '';
  const taskDiv = document.createElement('div');
  taskDiv.className = 'text-task';
  const h3 = document.createElement('h3');
  h3.textContent = currentTextTask.title;
  taskDiv.appendChild(h3);
  const p = document.createElement('p');
  p.textContent = currentTextTask.text;
  taskDiv.appendChild(p);
  const input = document.createElement('input');
  input.type = 'number';
  input.id = 'text-answer';
  input.placeholder = 'Sisesta vastus...';
  input.step = '0.01';
  input.setAttribute('aria-label', 'Answer input');
  input.onkeydown = (event) => { if (event.key === 'Enter') checkTextAnswer(); };
  taskDiv.appendChild(input);
  const btn = document.createElement('button');
  btn.textContent = 'Kontrolli';
  btn.style.marginTop = '4px';
  btn.onclick = checkTextAnswer;
  taskDiv.appendChild(btn);
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result';
  resultDiv.id = 'text-result';
  taskDiv.appendChild(resultDiv);
  const calcBox = document.createElement('div');
  calcBox.className = 'calc-box';
  calcBox.id = 'calc-box';
  calcBox.style.display = 'none';
  calcBox.textContent = currentTextTask.calc;
  taskDiv.appendChild(calcBox);
  area.appendChild(taskDiv);
  document.getElementById('text-answer').focus();
}

function checkTextAnswer() {
  const input = document.getElementById('text-answer');
  const result = document.getElementById('text-result');
  const calcBox = document.getElementById('calc-box');
  const val = parseFloat(input.value);
  if (isNaN(val)) {
    result.textContent = 'Sisesta number!';
    result.style.color = 'var(--warning)';
    return;
  }
  const diff = Math.abs(val - currentTextTask.answer);
  if (diff <= currentTextTask.tolerance) {
    result.textContent = '✅ Õige! +' + (75 * level) + ' punkti';
    result.style.color = 'var(--success)';
    score += 75 * level;
    stats.quizCorrect++;
    localStorage.setItem('traffic_stats', JSON.stringify(stats));
    calcBox.style.display = 'block';
    playSoundCorrect();
    checkAchievements();
  } else {
    result.textContent = '❌ Vale. Õige vastus: ' + currentTextTask.answer + '. ' + currentTextTask.hint;
    result.style.color = 'var(--danger)';
    calcBox.style.display = 'block';
    playSoundWrong();
  }
  updateUI();
}

/* ============================================================
   MODE MANAGEMENT
   ============================================================ */
function setMode(m) {
  if (reactionTimeout) { clearTimeout(reactionTimeout); reactionTimeout = null; }
  if (reactionRetryTimeout) { clearTimeout(reactionRetryTimeout); reactionRetryTimeout = null; }
  reactionActive = false;

  mode = m;
  transitionState(GameState.PLAYING);
  document.querySelectorAll('#sidebar > div > button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + m);
  if (btn) btn.classList.add('active');
  document.getElementById('quiz-area').textContent = '';

  if (m === 'foor') {
    intersection.autoMode = true;
    document.getElementById('hint-text').textContent = 'Klõpsa fooril, et vahetada. Jälgi liiklust!';
  } else if (m === 'parkla') {
    initParkingLot();
    drawParkingLot();
    document.getElementById('hint-text').textContent = 'Leia õige parkimiskoht!';
  } else if (m === 'parkimine') {
    initParkingSim();
    document.getElementById('hint-text').textContent = 'Kasuta nooleklahve ← → ↑ ja Q/E pööramiseks.';
  } else if (m === 'kiirus') {
    showQuiz();
    document.getElementById('hint-text').textContent = 'Arvuta õige vastus kiiruse küsimustele.';
  } else if (m === 'prioriteet') {
    intersection.autoMode = false;
    document.getElementById('hint-text').textContent = 'Anna prioriteet kiirabile ja bussidele!';
  } else if (m === 'reaktsioon') {
    startReactionTest();
  } else if (m === 'ylesanded') {
    showTextTask();
    document.getElementById('hint-text').textContent = 'Lahenda praktilised liiklusülesanded.';
  } else if (m === 'quiz') {
    showQuiz();
  }
  playSoundClick();
}

/* ============================================================
   UI UPDATES
   ============================================================ */
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('s-vehicles').textContent = totalVehicles;
  document.getElementById('s-wait').textContent = totalVehicles > 0 ? (totalWait/totalVehicles).toFixed(1)+'s' : '0s';
  document.getElementById('s-co2').textContent = totalCO2.toFixed(2)+' kg';
  document.getElementById('s-success').textContent = totalVehicles > 0 ? Math.round(successCount/totalVehicles*100)+'%' : '0%';
  const avgSpd = vehicles.length > 0 ? vehicles.reduce((s,v) => s+v.speed, 0)/vehicles.length : 0;
  document.getElementById('s-speed').textContent = (avgSpd * 20).toFixed(0)+' km/h';
  document.getElementById('s-games').textContent = stats.gamesPlayed;

  // Level up
  const newLevel = Math.floor(score / 500) + 1;
  if (newLevel > level) {
    level = newLevel;
    stats.maxLevel = Math.max(stats.maxLevel || 1, level);
    localStorage.setItem('traffic_stats', JSON.stringify(stats));
    showBanner('⬆️ Tase ' + level + '!');
    playSoundLevelUp();
    checkAchievements();
  }

  // Track total score for achievements
  stats.totalScore = score;
  localStorage.setItem('traffic_stats', JSON.stringify(stats));

  // Persist
  localStorage.setItem('traffic_score', score);
  localStorage.setItem('traffic_level', level);
}

/* ============================================================
   CANVAS INTERACTION
   ============================================================ */
canvas.addEventListener('click', (e) => {
  if (mode === 'foor') {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const lights = [
      { x: intersection.x - 45, y: intersection.y - 45, dir: 'ns' },
      { x: intersection.x + 45, y: intersection.y + 45, dir: 'ns' },
      { x: intersection.x - 45, y: intersection.y + 45, dir: 'ew' },
      { x: intersection.x + 45, y: intersection.y - 45, dir: 'ew' }
    ];
    for (const l of lights) {
      if (Math.abs(mx - l.x) < 20 && Math.abs(my - l.y) < 25) {
        if (intersection[l.dir] === 'red') {
          intersection[l.dir] = 'green';
          intersection[l.dir === 'ns' ? 'ew' : 'ns'] = 'red';
          score += 10;
          intersection.autoMode = true;
          intersection.timer = 0;
          if (currentEvent) { eventTimer = 0; currentEvent = null; }
          playSoundClick();
        }
        break;
      }
    }
  }
  if (mode === 'reaktsioon' && reactionActive) {
    clearTimeout(reactionTimeout);
    reactionTime = (performance.now() - reactionStart) / 1000;
    reactionActive = false;
    if (reactionTime < 0.5) {
      score += 150;
      stats.fastReaction++;
      localStorage.setItem('traffic_stats', JSON.stringify(stats));
      showBanner('⚡ Suurepärane reaktsioon!');
      playSoundCorrect();
    } else if (reactionTime < 1) {
      score += 75;
      showBanner('👍 Hea reaktsioon');
      playSoundCorrect();
    } else if (reactionTime < 2) {
      score += 25;
      showBanner('👍 OK');
    } else {
      showBanner('🐢 Aeglane...');
      playSoundWrong();
    }
    document.getElementById('hint-text').textContent = `Reaktsioon: ${reactionTime.toFixed(2)}s`;
    reactionRetryTimeout = setTimeout(() => { if (mode === 'reaktsioon') startReactionTest(); }, 2000);
    checkAchievements();
    updateUI();
  }
});

/* ============================================================
   KEYBOARD CONTROLS
   ============================================================ */
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (mode === 'parkimine') {
    if (e.key === 'q') parkingSim.car.angle -= 0.05;
    if (e.key === 'e') parkingSim.car.angle += 0.05;
  }
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'n' || e.key === 'N') {
    if (mode === 'kiirus' || mode === 'quiz') showQuiz();
    else if (mode === 'ylesanded') showTextTask();
    else if (mode === 'parkla') { initParkingLot(); drawParkingLot(); }
    else if (mode === 'reaktsioon') startReactionTest();
    else if (mode === 'parkimine') initParkingSim();
  }
  if (e.key === 'h' || e.key === 'H') {
    const hintEl = document.getElementById('hint-text');
    if (mode === 'quiz' || mode === 'kiirus') {
      const quizHint = document.getElementById('quiz-hint');
      if (quizHint && quiz) quizHint.textContent = '💡 Vihje: ' + quiz.hint;
    }
    if (mode === 'foor') hintEl.textContent = '💡 Vihje: Klõpsa punasel fooril, et see roheliseks muuta.';
    if (mode === 'reaktsioon') hintEl.textContent = '💡 Vihje: Klõpsa kohe, kui foor muutub roheliseks.';
    if (mode === 'parkimine') hintEl.textContent = '💡 Vihje: Kasuta ↑ ette, ▼ tagasi, ← → pööramiseks.';
  }
  // Escape to close sidebar on mobile
  if (e.key === 'Escape') {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
});

document.addEventListener('keyup', (e) => { keys[e.key] = false; });

/* ============================================================
   TOUCH CONTROLS
   ============================================================ */
document.querySelectorAll('.touch-btn').forEach(btn => {
  const key = btn.getAttribute('data-key');
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    keys[key] = true;
  });
  btn.addEventListener('touchend', (e) => {
    e.preventDefault();
    keys[key] = false;
  });
  btn.addEventListener('mousedown', () => { keys[key] = true; });
  btn.addEventListener('mouseup', () => { keys[key] = false; });
  btn.addEventListener('mouseleave', () => { keys[key] = false; });
});

/* ============================================================
   MOBILE SIDEBAR
   ============================================================ */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const menuBtn = document.getElementById('menu-btn');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('show', isOpen);

/* ============================================================
   HIGH CONTRAST
   ============================================================ */
function toggleHighContrast() {
  const html = document.documentElement;
  if (html.getAttribute('data-theme') === 'high-contrast') {
    html.removeAttribute('data-theme');
    localStorage.removeItem('traffic_contrast');
  } else {
    html.setAttribute('data-theme', 'high-contrast');
    localStorage.setItem('traffic_contrast', '1');
  }
  playSoundClick();
}

/* ============================================================
   RESET
   ============================================================ */
function resetGame() {
  score = 0;
  level = 1;
  totalVehicles = 0;
  totalWait = 0;
  totalCO2 = 0;
  successCount = 0;
  stats.gamesPlayed++;
  localStorage.setItem('traffic_stats', JSON.stringify(stats));
  localStorage.removeItem('traffic_score');
  localStorage.removeItem('traffic_level');
  updateUI();
  showBanner('🔄 Lähtestatud!');
  checkAchievements();
}

/* ============================================================
   MAIN GAME LOOP
   ============================================================ */
let lastTime = 0;
let eventSpawnTimer = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  drawIntersection();
  spawnVehicle(dt);
  updateLights(dt);

  // Update vehicles
  vehicles = vehicles.filter(v => {
    const alive = v.update(dt);
    if (!alive) {
      totalVehicles++;
      totalWait += v.waitTime;
      totalCO2 += v.co2;
      if (v.waitTime < 3) successCount++;
      return false;
    }
    return true;
  });

  // Draw vehicles
  vehicles.forEach(v => v.draw());

  // Events
  eventSpawnTimer += dt;
  if (eventSpawnTimer > 15 + Math.random() * 10 && !currentEvent) {
    eventSpawnTimer = 0;
    triggerEvent();
  }
  if (currentEvent) {
    eventTimer -= dt;
    if (eventTimer <= 0) {
      currentEvent = null;
      intersection.autoMode = true;
    }
  }

  // Reaction mode visual
  if (mode === 'reaktsioon') {
    ctx.fillStyle = reactionActive ? '#0f0' : '#666';
    ctx.beginPath();
    ctx.arc(W/2, H/2, 60, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(reactionActive ? 'KLÕPSA!' : 'Oota...', W/2, H/2 + 5);
  }

  // Parking simulator
  if (mode === 'parkimine') {
    updateParkingSim(dt);
    drawParkingSim();
  }

  updateUI();
  requestAnimationFrame(gameLoop);
}

   INITIALIZATION
   ============================================================ */
function init() {
  // Apply saved preferences
  if (localStorage.getItem('traffic_contrast')) {
    document.documentElement.setAttribute('data-theme', 'high-contrast');
  }

  // Apply language
  setLanguage(currentLang);

  // Render achievements
  renderAchievements();

  // Update sound button
  document.getElementById('sound-btn').querySelector('span').textContent = soundEnabled ? '🔊 Sound' : '🔇 Muted';

  // Hide loading screen
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
    transitionState(GameState.MENU);
  }, 800);

  // Start game loop
  requestAnimationFrame(gameLoop);
}
